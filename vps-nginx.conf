# Simpan file ini di /etc/nginx/sites-available/mikhmon-admin
# Lalu aktifkan dengan: ln -s /etc/nginx/sites-available/mikhmon-admin /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name admin.hotspotanda.com; # GANTI dengan domain Anda

    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (jika nanti dibutuhkan)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API request (/api/) akan otomatis diteruskan oleh container frontend ke container backend
}
